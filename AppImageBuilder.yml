version: 1

script: |
  rm -rf AppDir || true
  mkdir -p AppDir/usr/bin
  mkdir -p AppDir/usr/libexec
  mkdir -p AppDir/usr/share/polkit-1/actions
  mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
  mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
  mkdir -p AppDir/usr/share/applications
  
  install -m755 target/release/perms-ui AppDir/usr/bin/perms
  install -m755 target/release/perms-helper AppDir/usr/libexec/perms-helper
  install -m644 packaging/org.perms.helper.policy AppDir/usr/share/polkit-1/actions/org.perms.helper.policy
  install -m644 icon/batch_Page\ 1.png AppDir/usr/share/icons/hicolor/512x512/apps/org.perms.app.png
  install -m644 icon/batch_Page\ 1.svg AppDir/usr/share/icons/hicolor/scalable/apps/org.perms.app.svg
  install -m644 packaging/org.perms.app.desktop AppDir/usr/share/applications/org.perms.app.desktop
  cp packaging/org.perms.app.desktop AppDir/perms.desktop
  sed -i 's/^Exec=.*/Exec=perms/' AppDir/perms.desktop
  sed -i 's/^Icon=.*/Icon=org.perms.app/' AppDir/perms.desktop
  cp icon/batch_Page\ 1.png AppDir/org.perms.app.png
  cp icon/batch_Page\ 1.png AppDir/perms.png
  cp icon/batch_Page\ 1.png AppDir/.DirIcon
  
  cat > AppDir/AppRun << 'APPRUN'
  #!/bin/bash
  SELF=$(readlink -f "$0")
  HERE=${SELF%/*}
  export PATH="${HERE}/usr/bin:${PATH}"
  export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
  exec "${HERE}/usr/bin/perms" "$@"
  APPRUN
  chmod +x AppDir/AppRun

AppDir:
  path: ./AppDir
  app_info:
    id: org.perms.app
    name: perms
    icon: org.perms.app
    version: 0.2.0
    exec: usr/bin/perms
    exec_args: $@
  apt:
    arch: amd64
    allow_unauthenticated: true
    sources:
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse'
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse'
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy-security main restricted universe multiverse'
    include:
      - bash
      - squashfs-tools
      - libgtk-4-1
      - libgtk-4-bin
      - libadwaita-1-0
      - libadwaita-1-dev
      - adwaita-icon-theme
      - librsvg2-common
      - libgdk-pixbuf-2.0-0
      - libcairo2
      - libsoup-3.0-0
      - libpango-1.0-0
      - libgirepository1.0-dev
      - perl
      - python3
      - sed
    exclude:
      - humanity-icon-theme
      - hicolor-icon-theme
  files:
    exclude:
      - usr/share/doc/*
      - usr/share/man/*
  runtime:
    env:
      GTK_PATH: $APPDIR/usr/lib/x86_64-linux-gnu/gtk-4.0
      ADWAITA_PATH: $APPDIR/usr/lib/x86_64-linux-gnu/adwaita-1
      GDK_PIXBUF_MODULE_FILE: $APPDIR/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders.cache

AppImage:
  arch: x86_64
  update-information: None
  sign-key: None
